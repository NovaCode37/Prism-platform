name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 modules/ web/ --max-line-length=120 --ignore=E501,W503,E203 --exclude=__pycache__

      - name: Run tests with coverage
        env:
          EMAILREP_API_KEY: ""
          NUMVERIFY_API_KEY: ""
          LEAK_LOOKUP_API_KEY: ""
          IPINFO_API_KEY: ""
          VIRUSTOTAL_API_KEY: ""
          ABUSEIPDB_API_KEY: ""
          SHODAN_API_KEY: ""
        run: |
          pytest tests/ -v --cov=modules --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t osint-toolkit:${{ github.sha }} .

      - name: Smoke test Docker image
        run: |
          docker run -d --name osint-test -p 8080:8080 osint-toolkit:${{ github.sha }}
          sleep 10
          curl --fail http://localhost:8080/ || (docker logs osint-test && exit 1)
          docker stop osint-test
